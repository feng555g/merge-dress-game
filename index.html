<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>合成养成游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: linear-gradient(to bottom, #F5F5F5, #E0E0E0);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    #gameContainer {
      position: relative;
      width: 800px;
      height: 600px;
      background: white;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      border-radius: 8px;
      overflow: hidden;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      transform-origin: top left;
    }

    #loadingScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      z-index: 1000;
    }

    #loadingScreen h1 {
      font-size: 48px;
      margin-bottom: 40px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    #loadingBar {
      width: 400px;
      height: 20px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    #loadingProgress {
      width: 0%;
      height: 100%;
      background: white;
      transition: width 0.3s ease;
    }

    #loadingText {
      font-size: 18px;
      opacity: 0.9;
    }

    @media (max-width: 820px) {
      #gameContainer {
        width: 100vw;
        height: 75vw;
        max-height: 100vh;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="loadingScreen">
      <h1>合成养成游戏</h1>
      <div id="loadingBar">
        <div id="loadingProgress"></div>
      </div>
      <div id="loadingText">加载中... 0%</div>
    </div>
  </div>

  <script>
    class GameState {
      constructor() {
        this.currentChapter = 1;
        this.currentLevel = 1;
        this.inventory = {};
        this.completedLevels = [];
      }

      addItem(itemId, count = 1) {
        this.inventory[itemId] = (this.inventory[itemId] || 0) + count;
      }

      removeItem(itemId, count = 1) {
        const current = this.inventory[itemId] || 0;
        if (current < count) return false;
        this.inventory[itemId] = current - count;
        if (this.inventory[itemId] === 0) {
          delete this.inventory[itemId];
        }
        return true;
      }

      hasItem(itemId, count = 1) {
        return (this.inventory[itemId] || 0) >= count;
      }

      completeLevel(chapter, level) {
        const levelKey = `${chapter}-${level}`;
        if (!this.completedLevels.includes(levelKey)) {
          this.completedLevels.push(levelKey);
        }
      }

      isLevelCompleted(chapter, level) {
        const levelKey = `${chapter}-${level}`;
        return this.completedLevels.includes(levelKey);
      }

      isChapterUnlocked(chapter) {
        if (chapter === 1) return true;

        // Check if previous chapter is complete by looking at completedLevels
        // A chapter is complete when we have at least one level from the next chapter
        // OR when we check the actual completed levels for the previous chapter
        const prevChapter = chapter - 1;

        // Count how many levels from previous chapter are completed
        const prevChapterCompletedCount = this.completedLevels.filter(key => {
          const [ch] = key.split('-').map(Number);
          return ch === prevChapter;
        }).length;

        // For now, assume chapters have varying levels: Ch1=3, Ch2=2, Ch3=1
        // This is a temporary solution until DataLoader is available
        const levelCounts = {1: 3, 2: 2, 3: 1};
        const requiredLevels = levelCounts[prevChapter] || 3;

        return prevChapterCompletedCount >= requiredLevels;
      }

      toJSON() {
        return {
          currentChapter: this.currentChapter,
          currentLevel: this.currentLevel,
          inventory: this.inventory,
          completedLevels: this.completedLevels
        };
      }

      fromJSON(data) {
        this.currentChapter = data.currentChapter || 1;
        this.currentLevel = data.currentLevel || 1;
        this.inventory = data.inventory || {};
        this.completedLevels = data.completedLevels || [];
      }
    }

    class SaveSystem {
      constructor(gameState) {
        this.gameState = gameState;
        this.saveKey = 'mergeDressGame_save';
      }

      save() {
        try {
          const data = this.gameState.toJSON();
          localStorage.setItem(this.saveKey, JSON.stringify(data));
          return true;
        } catch (e) {
          console.error('Save failed:', e);
          return false;
        }
      }

      load() {
        try {
          const data = localStorage.getItem(this.saveKey);
          if (data) {
            this.gameState.fromJSON(JSON.parse(data));
            return true;
          }
          return false;
        } catch (e) {
          console.error('Load failed:', e);
          return false;
        }
      }

      clear() {
        localStorage.removeItem(this.saveKey);
      }
    }

    class DataLoader {
      constructor() {
        this.items = [];
        this.chapters = [];
        this.levels = {};
      }

      async loadAll() {
        try {
          // Load items
          const itemsRes = await fetch('data/items/items.json');
          this.items = await itemsRes.json();

          // Load chapters
          const chaptersRes = await fetch('data/chapters/chapters.json');
          this.chapters = await chaptersRes.json();

          // Load all levels
          for (let chapter = 1; chapter <= 3; chapter++) {
            const chapterData = this.chapters.find(c => c.id === chapter);
            if (!chapterData) continue;

            for (const levelId of chapterData.levels) {
              const levelRes = await fetch(`data/levels/chapter${chapter}/level_${levelId}.json`);
              const levelData = await levelRes.json();
              this.levels[levelId] = levelData;
            }
          }

          return true;
        } catch (e) {
          console.error('Data loading failed:', e);
          return false;
        }
      }

      getItem(itemId) {
        return this.items.find(item => item.id === itemId);
      }

      getChapter(chapterId) {
        return this.chapters.find(chapter => chapter.id === chapterId);
      }

      getLevel(levelId) {
        return this.levels[levelId];
      }

      getItemsByType(type) {
        return this.items.filter(item => item.type === type);
      }
    }
  </script>
</body>
</html>
