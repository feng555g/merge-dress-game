<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>合成养成游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: linear-gradient(to bottom, #F5F5F5, #E0E0E0);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    #gameContainer {
      position: relative;
      width: 800px;
      height: 600px;
      background: white;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      border-radius: 8px;
      overflow: hidden;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      transform-origin: top left;
    }

    #loadingScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      z-index: 1000;
    }

    #loadingScreen h1 {
      font-size: 48px;
      margin-bottom: 40px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    #loadingBar {
      width: 400px;
      height: 20px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    #loadingProgress {
      width: 0%;
      height: 100%;
      background: white;
      transition: width 0.3s ease;
    }

    #loadingText {
      font-size: 18px;
      opacity: 0.9;
    }

    @media (max-width: 820px) {
      #gameContainer {
        width: 100vw;
        height: 75vw;
        max-height: 100vh;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="loadingScreen">
      <h1>合成养成游戏</h1>
      <div id="loadingBar">
        <div id="loadingProgress"></div>
      </div>
      <div id="loadingText">加载中... 0%</div>
    </div>
  </div>

  <script>
    class GameState {
      constructor() {
        this.currentChapter = 1;
        this.currentLevel = 1;
        this.inventory = {};
        this.completedLevels = [];
      }

      addItem(itemId, count = 1) {
        this.inventory[itemId] = (this.inventory[itemId] || 0) + count;
      }

      removeItem(itemId, count = 1) {
        const current = this.inventory[itemId] || 0;
        if (current < count) return false;
        this.inventory[itemId] = current - count;
        if (this.inventory[itemId] === 0) {
          delete this.inventory[itemId];
        }
        return true;
      }

      hasItem(itemId, count = 1) {
        return (this.inventory[itemId] || 0) >= count;
      }

      completeLevel(chapter, level) {
        const levelKey = `${chapter}-${level}`;
        if (!this.completedLevels.includes(levelKey)) {
          this.completedLevels.push(levelKey);
        }
      }

      isLevelCompleted(chapter, level) {
        const levelKey = `${chapter}-${level}`;
        return this.completedLevels.includes(levelKey);
      }

      isChapterUnlocked(chapter) {
        if (chapter === 1) return true;

        // Check if previous chapter is complete by looking at completedLevels
        // A chapter is complete when we have at least one level from the next chapter
        // OR when we check the actual completed levels for the previous chapter
        const prevChapter = chapter - 1;

        // Count how many levels from previous chapter are completed
        const prevChapterCompletedCount = this.completedLevels.filter(key => {
          const [ch] = key.split('-').map(Number);
          return ch === prevChapter;
        }).length;

        // For now, assume chapters have varying levels: Ch1=3, Ch2=2, Ch3=1
        // This is a temporary solution until DataLoader is available
        const levelCounts = {1: 3, 2: 2, 3: 1};
        const requiredLevels = levelCounts[prevChapter] || 3;

        return prevChapterCompletedCount >= requiredLevels;
      }

      toJSON() {
        return {
          currentChapter: this.currentChapter,
          currentLevel: this.currentLevel,
          inventory: this.inventory,
          completedLevels: this.completedLevels
        };
      }

      fromJSON(data) {
        this.currentChapter = data.currentChapter || 1;
        this.currentLevel = data.currentLevel || 1;
        this.inventory = data.inventory || {};
        this.completedLevels = data.completedLevels || [];
      }
    }

    class SaveSystem {
      constructor(gameState) {
        this.gameState = gameState;
        this.saveKey = 'mergeDressGame_save';
      }

      save() {
        try {
          const data = this.gameState.toJSON();
          localStorage.setItem(this.saveKey, JSON.stringify(data));
          return true;
        } catch (e) {
          console.error('Save failed:', e);
          return false;
        }
      }

      load() {
        try {
          const data = localStorage.getItem(this.saveKey);
          if (data) {
            this.gameState.fromJSON(JSON.parse(data));
            return true;
          }
          return false;
        } catch (e) {
          console.error('Load failed:', e);
          return false;
        }
      }

      clear() {
        localStorage.removeItem(this.saveKey);
      }
    }

    class DataLoader {
      constructor() {
        this.items = [];
        this.chapters = [];
        this.levels = {};
      }

      async loadAll() {
        try {
          // Load items
          const itemsRes = await fetch('data/items/items.json');
          if (!itemsRes.ok) throw new Error(`Failed to load items: ${itemsRes.status}`);
          this.items = await itemsRes.json();

          // Load chapters
          const chaptersRes = await fetch('data/chapters/chapters.json');
          if (!chaptersRes.ok) throw new Error(`Failed to load chapters: ${chaptersRes.status}`);
          this.chapters = await chaptersRes.json();

          // Load all levels
          for (const chapterData of this.chapters) {
            const chapter = chapterData.id;

            for (const levelId of chapterData.levels) {
              const levelRes = await fetch(`data/levels/chapter${chapter}/level_${levelId}.json`);
              if (!levelRes.ok) throw new Error(`Failed to load level ${levelId}: ${levelRes.status}`);
              const levelData = await levelRes.json();
              this.levels[levelId] = levelData;
            }
          }

          return true;
        } catch (e) {
          console.error('Data loading failed:', e);
          return false;
        }
      }

      getItem(itemId) {
        return this.items.find(item => item.id === itemId);
      }

      getChapter(chapterId) {
        return this.chapters.find(chapter => chapter.id === chapterId);
      }

      getLevel(levelId) {
        return this.levels[levelId];
      }

      getItemsByType(type) {
        return this.items.filter(item => item.type === type);
      }
    }

    class AssetLoader {
      constructor() {
        this.images = {};
        this.totalAssets = 0;
        this.loadedAssets = 0;
      }

      async loadAll(onProgress) {
        const assetPaths = [
          // Items (23 files)
          'assets/items/leaf_1.png',
          'assets/items/leaf_2.png',
          'assets/items/leaf_3.png',
          'assets/items/flower_1.png',
          'assets/items/flower_2.png',
          'assets/items/flower_3.png',
          'assets/items/gem_1.png',
          'assets/items/gem_2.png',
          'assets/items/gem_3.png',
          'assets/items/wood_1.png',
          'assets/items/wood_2.png',
          'assets/items/wood_3.png',
          'assets/items/fabric_1.png',
          'assets/items/fabric_2.png',
          'assets/items/silk.png',
          'assets/items/gem_shard.png',
          'assets/items/cut_gem.png',
          'assets/items/wood_plank.png',
          'assets/items/polished_wood.png',
          'assets/items/dress_casual.png',
          'assets/items/coat_travel.png',
          'assets/items/boots_leather.png',
          'assets/items/dress_evening.png',
          // UI (1 file)
          'assets/ui/menu_bg.jpg'
        ];

        this.totalAssets = assetPaths.length;
        this.loadedAssets = 0;

        const loadPromises = assetPaths.map(path => {
          return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
              const key = path.split('/').pop().replace(/\.(png|jpg)$/, '');
              this.images[key] = img;
              this.loadedAssets++;
              if (onProgress) {
                onProgress(this.loadedAssets, this.totalAssets);
              }
              resolve();
            };
            img.onerror = () => {
              console.warn(`Failed to load: ${path}`);
              this.loadedAssets++;
              if (onProgress) {
                onProgress(this.loadedAssets, this.totalAssets);
              }
              resolve(); // Don't reject, continue loading
            };
            img.src = path;
          });
        });

        await Promise.all(loadPromises);
        return true;
      }

      getImage(key) {
        return this.images[key] || null;
      }
    }

    class Scene {
      constructor(game) {
        this.game = game;
      }

      onEnter() {}
      onExit() {}
      update(deltaTime) {}
      render(ctx) {}
      onMouseDown(x, y) {}
      onMouseMove(x, y) {}
      onMouseUp(x, y) {}
    }

    class SceneManager {
      constructor(game) {
        this.game = game;
        this.currentScene = null;
      }

      switchTo(scene) {
        if (this.currentScene) {
          this.currentScene.onExit();
        }
        this.currentScene = scene;
        if (this.currentScene) {
          this.currentScene.onEnter();
        }
      }

      update(deltaTime) {
        if (this.currentScene) {
          this.currentScene.update(deltaTime);
        }
      }

      render(ctx) {
        if (this.currentScene) {
          this.currentScene.render(ctx);
        }
      }

      handleMouseDown(x, y) {
        if (this.currentScene) {
          this.currentScene.onMouseDown(x, y);
        }
      }

      handleMouseMove(x, y) {
        if (this.currentScene) {
          this.currentScene.onMouseMove(x, y);
        }
      }

      handleMouseUp(x, y) {
        if (this.currentScene) {
          this.currentScene.onMouseUp(x, y);
        }
      }
    }

    class Game {
      constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.gameState = new GameState();
        this.saveSystem = new SaveSystem(this.gameState);
        this.dataLoader = new DataLoader();
        this.assetLoader = new AssetLoader();
        this.sceneManager = new SceneManager(this);

        this.lastTime = 0;
        this.isRunning = false;

        this.setupInputHandlers();
      }

      setupInputHandlers() {
        const getCanvasCoords = (clientX, clientY) => {
          const rect = this.canvas.getBoundingClientRect();
          const scaleX = this.canvas.width / rect.width;
          const scaleY = this.canvas.height / rect.height;
          return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
          };
        };

        // Mouse events
        this.canvas.addEventListener('mousedown', (e) => {
          const coords = getCanvasCoords(e.clientX, e.clientY);
          this.sceneManager.handleMouseDown(coords.x, coords.y);
        });

        this.canvas.addEventListener('mousemove', (e) => {
          const coords = getCanvasCoords(e.clientX, e.clientY);
          this.sceneManager.handleMouseMove(coords.x, coords.y);
        });

        this.canvas.addEventListener('mouseup', (e) => {
          const coords = getCanvasCoords(e.clientX, e.clientY);
          this.sceneManager.handleMouseUp(coords.x, coords.y);
        });

        // Touch events
        this.canvas.addEventListener('touchstart', (e) => {
          e.preventDefault();
          const touch = e.touches[0];
          const coords = getCanvasCoords(touch.clientX, touch.clientY);
          this.sceneManager.handleMouseDown(coords.x, coords.y);
        });

        this.canvas.addEventListener('touchmove', (e) => {
          e.preventDefault();
          const touch = e.touches[0];
          const coords = getCanvasCoords(touch.clientX, touch.clientY);
          this.sceneManager.handleMouseMove(coords.x, coords.y);
        });

        this.canvas.addEventListener('touchend', (e) => {
          e.preventDefault();
          if (e.changedTouches.length > 0) {
            const touch = e.changedTouches[0];
            const coords = getCanvasCoords(touch.clientX, touch.clientY);
            this.sceneManager.handleMouseUp(coords.x, coords.y);
          }
        });
      }

      async init() {
        // Update loading screen
        const updateLoading = (loaded, total) => {
          const percent = Math.floor((loaded / total) * 100);
          document.getElementById('loadingProgress').style.width = percent + '%';
          document.getElementById('loadingText').textContent = `加载中... ${percent}%`;
        };

        // Load data
        updateLoading(0, 2);
        await this.dataLoader.loadAll();
        updateLoading(1, 2);

        // Load assets
        await this.assetLoader.loadAll((loaded, total) => {
          updateLoading(1 + (loaded / total), 2);
        });

        // Load save
        this.saveSystem.load();

        // Hide loading screen
        document.getElementById('loadingScreen').style.display = 'none';

        // Start game loop
        this.isRunning = true;
        this.lastTime = performance.now();
        this.gameLoop(this.lastTime);
      }

      gameLoop(currentTime) {
        if (!this.isRunning) return;

        const deltaTime = (currentTime - this.lastTime) / 1000;
        this.lastTime = currentTime;

        // Update
        this.sceneManager.update(deltaTime);

        // Render
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.sceneManager.render(this.ctx);

        requestAnimationFrame((time) => this.gameLoop(time));
      }

      start() {
        this.init();
      }
    }

    // Start game when page loads
    window.addEventListener('load', () => {
      const game = new Game();
      game.start();
    });
  </script>
</body>
</html>
