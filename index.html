<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>梦想改造家</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: linear-gradient(to bottom, #F5F5F5, #E0E0E0);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #gameContainer {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: white;
      overflow: hidden;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      transform-origin: top left;
    }

    #loadingScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      z-index: 1000;
    }

    #loadingScreen h1 {
      font-size: 48px;
      margin-bottom: 40px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    #loadingBar {
      width: 400px;
      height: 20px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    #loadingProgress {
      width: 0%;
      height: 100%;
      background: white;
      transition: width 0.3s ease;
    }

    #loadingText {
      font-size: 18px;
      opacity: 0.9;
    }

  </style>
</head>

  <div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="loadingScreen">
      <h1>梦想改造家</h1>

        <div id="loadingProgress"></div>
      </div>
      <div id="loadingText">加载中... 0%</div>
    </div>

    // Polyfill for CanvasRenderingContext2D.roundRect
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, width, height, radius) {
        if (width < 2 * radius) radius = width / 2;
        if (height < 2 * radius) radius = height / 2;
        this.moveTo(x + radius, y);
        this.arcTo(x + width, y, x + width, y + height, radius);
        this.arcTo(x + width, y + height, x, y + height, radius);
        this.arcTo(x, y + height, x, y, radius);
        this.arcTo(x, y, x + width, y, radius);
        this.closePath();
        return this;
      };
    }

    class GameState {
      constructor() {
        this.currentChapter = 1;
        this.currentLevel = 1;
        this.inventory = {};
        this.completedLevels = [];
        this.outfit = {};
        this.placedFurniture = {};
        this.completedGoals = [];
      }

      addItem(itemId, count = 1) {
        this.inventory[itemId] = (this.inventory[itemId] || 0) + count;
      }

      removeItem(itemId, count = 1) {
        const current = this.inventory[itemId] || 0;
        if (current < count) return false;
        this.inventory[itemId] = current - count;
        if (this.inventory[itemId] === 0) {
          delete this.inventory[itemId];
        }
        return true;
      }

      hasItem(itemId, count = 1) {
        return (this.inventory[itemId] || 0) >= count;
      }

      completeLevel(chapter, level) {
        const levelKey = `${chapter}-${level}`;
        if (!this.completedLevels.includes(levelKey)) {
          this.completedLevels.push(levelKey);
        }
      }

      isLevelCompleted(chapter, level) {
        const levelKey = `${chapter}-${level}`;
        return this.completedLevels.includes(levelKey);
      }

      isChapterUnlocked(chapter) {
        if (chapter === 1) return true;

        // Check if previous chapter is complete by looking at completedLevels
        // A chapter is complete when we have at least one level from the next chapter
        // OR when we check the actual completed levels for the previous chapter
        const prevChapter = chapter - 1;

        // Count how many levels from previous chapter are completed
        const prevChapterCompletedCount = this.completedLevels.filter(key => {
          const [ch] = key.split('-').map(Number);
          return ch === prevChapter;
        }).length;

        // Level counts per chapter
        const levelCounts = {1: 3, 2: 2, 3: 1, 4: 3, 5: 2};
        const requiredLevels = levelCounts[prevChapter] || 3;

        return prevChapterCompletedCount >= requiredLevels;
      }

      equip(slot, itemId) {
        this.outfit[slot] = itemId;
      }

      unequip(slot) {
        delete this.outfit[slot];
      }

      completeGoal(goalId) {
        if (!this.completedGoals.includes(goalId)) {
          this.completedGoals.push(goalId);
        }
      }

      isGoalCompleted(goalId) {
        return this.completedGoals.includes(goalId);
      }

      toJSON() {
        return {
          currentChapter: this.currentChapter,
          currentLevel: this.currentLevel,
          inventory: this.inventory,
          completedLevels: this.completedLevels,
          outfit: this.outfit,
          placedFurniture: this.placedFurniture,
          completedGoals: this.completedGoals
        };
      }

      fromJSON(data) {
        this.currentChapter = data.currentChapter || 1;
        this.currentLevel = data.currentLevel || 1;
        this.inventory = data.inventory || {};
        this.completedLevels = data.completedLevels || [];
        this.outfit = data.outfit || {};
        this.placedFurniture = data.placedFurniture || {};
        this.completedGoals = data.completedGoals || [];
      }
    }

    class SaveSystem {
      constructor(gameState) {
        this.gameState = gameState;
        this.saveKey = 'mergeDressGame_save';
      }

      save() {
        try {
          const data = this.gameState.toJSON();
          localStorage.setItem(this.saveKey, JSON.stringify(data));
          return true;
        } catch (e) {
          console.error('Save failed:', e);
          return false;
        }
      }

      load() {
        try {
          const data = localStorage.getItem(this.saveKey);
          if (data) {
            this.gameState.fromJSON(JSON.parse(data));
            return true;
          }
          return false;
        } catch (e) {
          console.error('Load failed:', e);
          return false;
        }
      }

      clear() {
        localStorage.removeItem(this.saveKey);
      }
    }

    class DataLoader {
      constructor() {
        this.items = [];
        this.chapters = [];
        this.levels = {};
        this.recipes = [];
        this.stories = {};
      }

      async loadAll() {
        try {
          this.items = GAME_DATA.items;
          this.chapters = GAME_DATA.chapters;
          this.levels = GAME_DATA.levels;
          this.recipes = GAME_DATA.recipes;
          this.stories = GAME_DATA.stories;
          return true;
        } catch (e) {
          console.error('Data loading failed:', e);
          return false;
        }
      }

      getItem(itemId) {
        return this.items.find(item => item.id === itemId);
      }

      getChapter(chapterId) {
        return this.chapters.find(chapter => chapter.id === chapterId);
      }

      getLevel(levelId) {
        return this.levels[levelId];
      }

      getItemsByType(type) {
        return this.items.filter(item => item.type === type);
      }

      getRecipe(recipeId) {
        return this.recipes.find(r => r.id === recipeId);
      }

      getStory(chapter, trigger) {
        const stories = this.stories[chapter] || [];
        return stories.find(s => s.trigger === trigger) || null;
      }
    }

    class AssetLoader {
      constructor() {
        this.images = {};
        this.processedImages = {};
        this.totalAssets = 0;
        this.loadedAssets = 0;
      }

      removeBlackBackground(img) {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');

        ctx.drawImage(img, 0, 0);

        const imageData = ctx.getImageData(0, 0, img.width, img.height);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i];
          const g = data[i + 1];
          const b = data[i + 2];
          // If pixel is very dark (close to black), make it transparent
          if (r < 30 && g < 30 && b < 30) {
            data[i + 3] = 0;
          }
        }
        ctx.putImageData(imageData, 0, 0);

        return canvas;
      }

      async loadAll(onProgress) {
        const assetPaths = [
          // Items (23 files)
          'assets/items/leaf_1.png',
          'assets/items/leaf_2.png',
          'assets/items/leaf_3.png',

          'assets/items/dress_casual.png',
          'assets/items/coat_travel.png',
          'assets/items/boots_leather.png',
          'assets/items/dress_evening.png',
          // Furniture (6 files)
          'assets/furniture/table_old.png',
          'assets/furniture/chair_fabric.png',
          'assets/furniture/bookshelf.png',
          'assets/furniture/dresser.png',
          'assets/furniture/lamp_desk.png',
          'assets/furniture/painting.png',
          // Character (1 file)
          'assets/characters/character.png',
          // UI (1 file)
          'assets/ui/main_bg.png',
          'assets/ui/level_bg.png',
          // Generator machine
          'assets/characters/img.png'
        ];

        this.totalAssets = assetPaths.length;
        this.loadedAssets = 0;

        const loadPromises = assetPaths.map(path => {
          return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
              const key = path.split('/').pop().replace(/\.(png|jpg)$/, '');
              this.images[key] = img;
              // PNGs already have transparent backgrounds — skip canvas processing
              // (getImageData is blocked under file:// protocol)
              this.loadedAssets++;
              if (onProgress) {
                onProgress(this.loadedAssets, this.totalAssets);
              }
              resolve();
            };
            img.onerror = () => {
              console.warn(`Failed to load: ${path}`);
              this.loadedAssets++;
              if (onProgress) {
                onProgress(this.loadedAssets, this.totalAssets);
              }
              resolve(); // Don't reject, continue loading
            };
            img.src = path;
          });
        });

        await Promise.all(loadPromises);
        return true;
      }

      getImage(key) {
        // Return processed image if available, otherwise return original
        return this.processedImages[key] || this.images[key] || null;
      }
    }

    class SceneManager {
      constructor(game) {
        this.game = game;
        this.currentScene = null;
      }

      switchTo(scene) {
        if (this.currentScene) {
          this.currentScene.onExit();
        }
        this.currentScene = scene;
        if (this.currentScene) {
          this.currentScene.onEnter();
        }
      }

      update(deltaTime) {
        if (this.currentScene) {
          this.currentScene.update(deltaTime);
        }
      }

      render(ctx) {
        if (this.currentScene) {
          this.currentScene.render(ctx);
        }
      }

      handleMouseDown(x, y) {
        if (this.currentScene) {
          this.currentScene.onMouseDown(x, y);
        }
      }

      handleMouseMove(x, y) {
        if (this.currentScene) {
          this.currentScene.onMouseMove(x, y);
        }
      }

      handleMouseUp(x, y) {
        if (this.currentScene) {
          this.currentScene.onMouseUp(x, y);
        }
      }
    }

    class Game {
      constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');

        // HiDPI / Retina support — canvas fills full viewport via CSS,
        // internal resolution matches physical pixels for crisp rendering.
        const dpr = window.devicePixelRatio || 1;
        const logicalW = 800;
        const logicalH = 600;
        // Set internal buffer to physical pixel size
        this.canvas.width  = window.innerWidth  * dpr;
        this.canvas.height = window.innerHeight * dpr;
        // Let CSS (width/height: 100%) control display size — don't override it
        this.ctx.scale(
          (window.innerWidth  * dpr) / logicalW,
          (window.innerHeight * dpr) / logicalH
        );

        this.gameState = new GameState();
        this.saveSystem = new SaveSystem(this.gameState);
        this.dataLoader = new DataLoader();
        this.assetLoader = new AssetLoader();
        this.sceneManager = new SceneManager(this);

        this.lastTime = 0;
        this.isRunning = false;

        this.setupInputHandlers();
      }

      setupInputHandlers() {
        const getCanvasCoords = (clientX, clientY) => {
          const rect = this.canvas.getBoundingClientRect();
          const scaleX = 800 / rect.width;
          const scaleY = 600 / rect.height;
          return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
          };
        };

        // Mouse events
        this.canvas.addEventListener('mousedown', (e) => {
          const coords = getCanvasCoords(e.clientX, e.clientY);
          this.sceneManager.handleMouseDown(coords.x, coords.y);
        });

        this.canvas.addEventListener('mousemove', (e) => {
          const coords = getCanvasCoords(e.clientX, e.clientY);
          this.sceneManager.handleMouseMove(coords.x, coords.y);
        });

        this.canvas.addEventListener('mouseup', (e) => {
          const coords = getCanvasCoords(e.clientX, e.clientY);
          this.sceneManager.handleMouseUp(coords.x, coords.y);
        });

        // Touch events
        this.canvas.addEventListener('touchstart', (e) => {
          e.preventDefault();
          const touch = e.touches[0];
          const coords = getCanvasCoords(touch.clientX, touch.clientY);
          this.sceneManager.handleMouseDown(coords.x, coords.y);
        });

        this.canvas.addEventListener('touchmove', (e) => {
          e.preventDefault();
          const touch = e.touches[0];
          const coords = getCanvasCoords(touch.clientX, touch.clientY);
          this.sceneManager.handleMouseMove(coords.x, coords.y);
        });

        this.canvas.addEventListener('touchend', (e) => {
          e.preventDefault();
          if (e.changedTouches.length > 0) {
            const touch = e.changedTouches[0];
            const coords = getCanvasCoords(touch.clientX, touch.clientY);
            this.sceneManager.handleMouseUp(coords.x, coords.y);
          }
        });
      }

      async init() {
        try {
          // Update loading screen
          const updateLoading = (loaded, total) => {
            const percent = Math.floor((loaded / total) * 100);
            document.getElementById('loadingProgress').style.width = percent + '%';
            document.getElementById('loadingText').textContent = `加载中... ${percent}%`;
          };

          // Load data
          console.log('Loading data...');
          updateLoading(0, 2);
          const dataLoaded = await this.dataLoader.loadAll();
          console.log('Data loaded:', dataLoaded);
          if (!dataLoaded) {
            throw new Error('Failed to load game data');
          }
          updateLoading(1, 2);

          // Load assets
          console.log('Loading assets...');
          await this.assetLoader.loadAll((loaded, total) => {
            updateLoading(1 + (loaded / total), 2);
          });
          console.log('Assets loaded');

          // Load save
          this.saveSystem.load();
          console.log('Save loaded');

          // Hide loading screen
          document.getElementById('loadingScreen').style.display = 'none';

          // Start with main menu
          const mainMenu = new MainMenu(this);
          this.sceneManager.switchTo(mainMenu);

          // Start game loop
          this.isRunning = true;
          this.lastTime = performance.now();
          this.gameLoop(this.lastTime);
          console.log('Game started');
        } catch (error) {
          console.error('Game initialization failed:', error);
          document.getElementById('loadingText').textContent = `加载失败: ${error.message}`;
          document.getElementById('loadingText').style.color = '#ff6b6b';
        }
      }

      gameLoop(currentTime) {
        if (!this.isRunning) return;

        const deltaTime = (currentTime - this.lastTime) / 1000;
        this.lastTime = currentTime;

        // Update
        this.sceneManager.update(deltaTime);

        // Render
        this.ctx.clearRect(0, 0, 800, 600);
        this.sceneManager.render(this.ctx);

        requestAnimationFrame((time) => this.gameLoop(time));
      }

      start() {
        this.init();
      }
    }

    class MainMenu extends Scene {
      constructor(game) {
        super(game);
        this.buttons = [];
      }

      onEnter() {
        this.buildButtons();
      }

      buildButtons() {
        this.buttons = [];
        const chapters = this.game.dataLoader.chapters;

        let yOffset = 90;
        for (const chapter of chapters) {
          // Chapter unlocked?
          const unlocked = this.game.gameState.isChapterUnlocked(chapter.id);

          // Chapter button area
          const chapterY = yOffset;
          yOffset += 26;

          // Level buttons
          const levelButtons = [];
          for (let i = 0; i < chapter.levels.length; i++) {
            const levelId = chapter.levels[i];
            const [chapterNum, levelNum] = levelId.split('_').map(Number);
            const completed = this.game.gameState.isLevelCompleted(chapterNum, levelNum);

            levelButtons.push({
              x: 200 + i * 100,
              y: yOffset,
              width: 85,
              height: 50,
              chapter: chapterNum,
              level: levelNum,
              levelId: levelId,
              unlocked: unlocked,
              completed: completed,
              label: `${chapterNum}-${levelNum}`
            });
          }

          this.buttons.push({
            type: 'chapter',
            chapter: chapter,
            chapterY: chapterY,
            levelButtons: levelButtons
          });

          yOffset += 68;
        }
      }

      render(ctx) {
        // Background image
        const bg = this.game.assetLoader.getImage('main_bg');
        if (bg) {
          ctx.drawImage(bg, 0, 0, 800, 600);
        } else {
          ctx.fillStyle = '#F5F5F5';
          ctx.fillRect(0, 0, 800, 600);
        }

        // Semi-transparent overlay for readability
        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        ctx.fillRect(0, 0, 800, 600);

        // Title
        ctx.fillStyle = '#3E2723';
        ctx.font = 'bold 48px "Microsoft YaHei", Arial';
        ctx.textAlign = 'center';
        ctx.fillText('梦想改造家', 400, 80);

        // Render chapters and levels
        for (const btn of this.buttons) {
          const unlocked = this.game.gameState.isChapterUnlocked(btn.chapter.id);

          // Chapter title
          ctx.fillStyle = '#3E2723';
          ctx.font = 'bold 24px "Microsoft YaHei", Arial';
          ctx.textAlign = 'left';
          ctx.fillText(`第${btn.chapter.id}章：${btn.chapter.name}`, 100, btn.chapterY);

          // Chapter goal progress (right side)
          if (unlocked) {
            const goals = btn.chapter.goals || [];
            const done = goals.filter(g => this.game.gameState.isGoalCompleted(g.id)).length;
            ctx.fillStyle = (done === goals.length && goals.length > 0) ? '#4CAF50' : '#9E9E9E';
            ctx.font = '15px "Microsoft YaHei", Arial';
            ctx.textAlign = 'right';
            ctx.fillText(`章节目标 ${done}/${goals.length}`, 750, btn.chapterY);
          }

          // Level buttons
          for (const levelBtn of btn.levelButtons) {
            this.renderLevelButton(ctx, levelBtn);
          }
        }

        // Action buttons row at bottom (4 buttons, w=155 each)
        const actionBtns = [
          { label: '配方工坊', x: 50, color: '#8B6F47' },
          { label: '装扮', x: 225, color: '#C2185B' },
          { label: '装修', x: 400, color: '#1565C0' },
          { label: '故事', x: 575, color: '#6A1B9A' }
        ];
        ctx.textBaseline = 'middle';
        for (const ab of actionBtns) {
          ctx.fillStyle = ab.color;
          ctx.beginPath();
          ctx.roundRect(ab.x, 548, 155, 46, 10);
          ctx.fill();
          ctx.fillStyle = '#FFFFFF';
          ctx.font = 'bold 17px "Microsoft YaHei", Arial';
          ctx.textAlign = 'center';
          ctx.fillText(ab.label, ab.x + 77, 571);
        }
        ctx.textBaseline = 'alphabetic';
      }

      renderLevelButton(ctx, btn) {
        // Button background
        if (btn.unlocked) {
          ctx.fillStyle = btn.completed ? '#4CAF50' : '#2196F3';
        } else {
          ctx.fillStyle = '#BDBDBD';
        }

        ctx.beginPath();
        ctx.roundRect(btn.x, btn.y, btn.width, btn.height, 8);
        ctx.fill();

        // Button border
        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Button text
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        if (btn.unlocked) {
          ctx.fillText(btn.label, btn.x + btn.width / 2, btn.y + btn.height / 2 - 5);
          if (btn.completed) {
            ctx.font = '16px Arial';
            ctx.fillText('✓', btn.x + btn.width / 2, btn.y + btn.height / 2 + 12);
          }
        } else {
          ctx.fillText('🔒', btn.x + btn.width / 2, btn.y + btn.height / 2);
        }
      }

      onMouseDown(x, y) {
        // Check level button clicks
        for (const btn of this.buttons) {
          for (const levelBtn of btn.levelButtons) {
            if (levelBtn.unlocked &&
                x >= levelBtn.x && x <= levelBtn.x + levelBtn.width &&
                y >= levelBtn.y && y <= levelBtn.y + levelBtn.height) {
              this.startLevel(levelBtn.chapter, levelBtn.level, levelBtn.levelId);
              return;
            }
          }
        }

        // Action buttons (x=50,225,400,575 w=155)
        if (y >= 548 && y <= 594) {
          if (x >= 50 && x <= 205) {
            this.game.sceneManager.switchTo(new Workshop(this.game));
            return;
          }
          if (x >= 225 && x <= 380) {
            this.game.sceneManager.switchTo(new DressUp(this.game));
            return;
          }
          if (x >= 400 && x <= 555) {
            this.game.sceneManager.switchTo(new Room(this.game));
            return;
          }
          if (x >= 575 && x <= 730) {
            const storyData = this.game.dataLoader.getStory(1, 'chapter_start');
            const scene = new Story(this.game, storyData, () => {
              this.game.sceneManager.switchTo(new MainMenu(this.game));
            });
            this.game.sceneManager.switchTo(scene);
            return;
          }
        }
      }

      startLevel(chapter, level, levelId) {
        const levelData = this.game.dataLoader.getLevel(levelId);
        if (levelData) {
          const mergeBoard = new MergeBoard(this.game, levelData, chapter, level);
          this.game.sceneManager.switchTo(mergeBoard);
        }
      }

      update(deltaTime) {}
      onMouseMove(x, y) {}
      onMouseUp(x, y) {}
    }

    class MergeBoard extends Scene {
      constructor(game, levelData, chapter, level) {
        super(game);
        this.levelData = levelData;
        this.chapter = chapter;
        this.level = level;

        this.gridCols = levelData.grid_size.cols;
        this.gridRows = levelData.grid_size.rows;
        this.cellSize = 70;
        this.gridX = (800 - this.gridCols * this.cellSize) / 2;
        this.gridY = 120;

        this.grid = Array(this.gridCols * this.gridRows).fill(null);
        this.goals = levelData.goals;
        this.collected = {};

        this.draggedItem = null;
        this.draggedFrom = -1;
        this.dragX = 0;
        this.dragY = 0;
        this.isDragging = false;

        this.animating = false;
        this.showVictory = false;

        // Generator machine - now placed in grid
        this.generatorCellIndex = -1; // Will be set randomly
      }

      onEnter() {
        this.initializeGrid();
        this.placeGenerator();
      }

      initializeGrid() {
        // Place initial items
        for (const item of this.levelData.initial_items) {
          const index = item.row * this.gridCols + item.col;
          this.grid[index] = {
            id: item.item_id,
            col: item.col,
            row: item.row
          };
        }
      }

      placeGenerator() {
        // Find all empty cells
        const emptyCells = [];
        for (let i = 0; i < this.grid.length; i++) {
          if (!this.grid[i]) {
            emptyCells.push(i);
          }
        }

        if (emptyCells.length > 0) {
          // Pick random empty cell for generator
          this.generatorCellIndex = emptyCells[Math.floor(Math.random() * emptyCells.length)];
        }
      }

      getAvailableGeneratorItems() {
        // Get tier 1 items from level's initial items
        const tier1Items = new Set();
        for (const item of this.levelData.initial_items) {
          const itemData = this.game.dataLoader.getItem(item.item_id);
          if (itemData && itemData.tier === 1) {
            tier1Items.add(item.item_id);
          }
        }
        return Array.from(tier1Items);
      }

      generateNewItem() {
        // Find empty cells (excluding generator cell)
        const emptyCells = [];
        for (let i = 0; i < this.grid.length; i++) {
          if (!this.grid[i] && i !== this.generatorCellIndex) {
            emptyCells.push(i);
          }
        }

        if (emptyCells.length === 0) {
          return; // Grid is full
        }

        // Get available tier 1 items
        const availableItems = this.getAvailableGeneratorItems();
        if (availableItems.length === 0) {
          return;
        }

        // Pick random item and random empty cell
        const randomItem = availableItems[Math.floor(Math.random() * availableItems.length)];
        const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
        const coords = this.getCellCoords(randomCell);

        this.grid[randomCell] = {
          id: randomItem,
          col: coords.col,
          row: coords.row
        };
      }

      getCellIndex(col, row) {
        if (col < 0 || col >= this.gridCols || row < 0 || row >= this.gridRows) {
          return -1;
        }
        return row * this.gridCols + col;
      }

      getCellCoords(index) {
        const col = index % this.gridCols;
        const row = Math.floor(index / this.gridCols);
        return { col, row };
      }

      getCellCenter(col, row) {
        return {
          x: this.gridX + col * this.cellSize + this.cellSize / 2,
          y: this.gridY + row * this.cellSize + this.cellSize / 2
        };
      }

      getCellAtPosition(x, y) {
        const col = Math.floor((x - this.gridX) / this.cellSize);
        const row = Math.floor((y - this.gridY) / this.cellSize);
        return this.getCellIndex(col, row);
      }

      render(ctx) {
        // Background
        const levelBg = this.game.assetLoader.getImage('level_bg');
        if (levelBg) {
          ctx.drawImage(levelBg, 0, 0, 800, 600);
        } else {
          ctx.fillStyle = 'rgb(60, 60, 65)';
          ctx.fillRect(0, 0, 800, 600);
        }

        // Title
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 24px "Microsoft YaHei", Arial';
        ctx.textAlign = 'center';
        ctx.fillText(`第${this.chapter}章 - 关卡${this.level}`, 400, 40);

        // Goals
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '18px "Microsoft YaHei", Arial';
        let goalText = '目标: ';
        for (const goal of this.goals) {
          const item = this.game.dataLoader.getItem(goal.item_id);
          if (item) {
            const collected = this.collected[goal.item_id] || 0;
            goalText += `${item.name} ${collected}/${goal.count}  `;
          }
        }
        ctx.fillText(goalText, 400, 70);
        ctx.textBaseline = 'alphabetic';

        // Grid
        this.renderGrid(ctx);

        // Generator machine
        this.renderGenerator(ctx);

        // Dragged item
        if (this.isDragging && this.draggedItem) {
          this.renderDraggedItem(ctx);
        }

        // Back button
        this.renderBackButton(ctx);

        // Victory screen (must be last to appear on top)
        if (this.showVictory) {
          this.renderVictory(ctx);
        }
      }

      renderGrid(ctx) {
        for (let row = 0; row < this.gridRows; row++) {
          for (let col = 0; col < this.gridCols; col++) {
            const x = this.gridX + col * this.cellSize;
            const y = this.gridY + row * this.cellSize;

            // Cell background
            ctx.fillStyle = 'rgb(60, 60, 65)';
            ctx.beginPath();
            ctx.roundRect(x + 2, y + 2, this.cellSize - 4, this.cellSize - 4, 8);
            ctx.fill();

            // Cell border
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(x + 2, y + 2, this.cellSize - 4, this.cellSize - 4, 8);
            ctx.stroke();

            // Item in cell
            const index = this.getCellIndex(col, row);
            const item = this.grid[index];
            if (item && !(this.isDragging && index === this.draggedFrom)) {
              this.renderItem(ctx, item.id, x + this.cellSize / 2, y + this.cellSize / 2, 1.0);
            }
          }
        }
      }

      renderItem(ctx, itemId, x, y, alpha) {
        const itemData = this.game.dataLoader.getItem(itemId);
        if (!itemData) return;

        const img = this.game.assetLoader.getImage(itemId);
        if (img) {
          ctx.save();
          ctx.globalAlpha = alpha;
          const size = this.cellSize * 0.8;
          ctx.drawImage(img, x - size / 2, y - size / 2, size, size);
          ctx.restore();
        } else {
          // Fallback: colored circle
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = itemData.color || '#999999';
          ctx.beginPath();
          ctx.arc(x, y, this.cellSize * 0.3, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      renderDraggedItem(ctx) {
        this.renderItem(ctx, this.draggedItem.id, this.dragX, this.dragY, 0.7);
      }

      renderBackButton(ctx) {
        ctx.fillStyle = '#757575';
        ctx.beginPath();
        ctx.roundRect(20, 520, 100, 50, 8);
        ctx.fill();

        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 18px "Microsoft YaHei", Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('返回', 70, 545);
      }

      renderGenerator(ctx) {
        if (this.generatorCellIndex < 0) return;

        const coords = this.getCellCoords(this.generatorCellIndex);
        const center = this.getCellCenter(coords.col, coords.row);
        const size = this.cellSize * 0.9;
        const x = center.x - size / 2;
        const y = center.y - size / 2;

        // Generator background
        ctx.fillStyle = '#4CAF50';
        ctx.beginPath();
        ctx.roundRect(x, y, size, size, 8);
        ctx.fill();

        // Generator image
        const generatorImg = this.game.assetLoader.getImage('img');
        if (generatorImg) {
          ctx.drawImage(generatorImg, x + 5, y + 5, size - 10, size - 10);
        } else {
          // Fallback: plus icon
          ctx.strokeStyle = '#FFFFFF';
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(center.x, y + 15);
          ctx.lineTo(center.x, y + size - 15);
          ctx.moveTo(x + 15, center.y);
          ctx.lineTo(x + size - 15, center.y);
          ctx.stroke();
        }
      }

      renderVictory(ctx) {
        // Semi-transparent overlay
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(0, 0, 800, 600);

        // Victory panel
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.roundRect(200, 150, 400, 300, 16);
        ctx.fill();

        // Title
        ctx.fillStyle = '#4CAF50';
        ctx.font = 'bold 36px "Microsoft YaHei", Arial';
        ctx.textAlign = 'center';
        ctx.fillText('关卡完成！', 400, 220);

        // Rewards
        ctx.fillStyle = '#3E2723';
        ctx.font = '20px "Microsoft YaHei", Arial';
        ctx.fillText('获得奖励：', 400, 280);

        // Show rewards from level config
        ctx.font = '18px "Microsoft YaHei", Arial';
        let rewardY = 320;
        if (this.levelData.rewards) {
          for (const reward of this.levelData.rewards) {
            const item = this.game.dataLoader.getItem(reward.item_id);
            if (item) {
              ctx.fillText(`${item.name} × ${reward.count}`, 400, rewardY);
              rewardY += 30;
            }
          }
        }

        // Return button
        ctx.fillStyle = '#4CAF50';
        ctx.beginPath();
        ctx.roundRect(300, 370, 200, 50, 8);
        ctx.fill();

        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 20px "Microsoft YaHei", Arial';
        ctx.fillText('返回主菜单', 400, 395);
      }

      update(deltaTime) {
        // No cooldown needed anymore
      }

      onMouseDown(x, y) {
        // Check victory return button first
        if (this.showVictory) {
          if (x >= 300 && x <= 500 && y >= 370 && y <= 420) {
            const mainMenu = new MainMenu(this.game);
            this.game.sceneManager.switchTo(mainMenu);
          }
          return;
        }

        if (this.animating) return;

        // Check back button
        if (x >= 20 && x <= 120 && y >= 520 && y <= 570) {
          const mainMenu = new MainMenu(this.game);
          this.game.sceneManager.switchTo(mainMenu);
          return;
        }

        // Check grid cell
        const cellIndex = this.getCellAtPosition(x, y);

        // Check if clicked on generator cell
        if (cellIndex === this.generatorCellIndex) {
          this.generateNewItem();
          return;
        }

        // Check if clicked on item cell
        if (cellIndex >= 0 && this.grid[cellIndex]) {
          this.draggedItem = this.grid[cellIndex];
          this.draggedFrom = cellIndex;
          this.dragX = x;
          this.dragY = y;
          this.isDragging = true;
        }
      }

      onMouseMove(x, y) {
        if (this.isDragging) {
          this.dragX = x;
          this.dragY = y;
        }
      }

      onMouseUp(x, y) {
        if (!this.isDragging) return;

        const targetIndex = this.getCellAtPosition(x, y);
        let actionPerformed = false;

        // Prevent dropping on generator cell
        if (targetIndex >= 0 && targetIndex !== this.draggedFrom && targetIndex !== this.generatorCellIndex) {
          const targetItem = this.grid[targetIndex];

          if (!targetItem) {
            // Move to empty cell
            this.grid[targetIndex] = this.draggedItem;
            const coords = this.getCellCoords(targetIndex);
            this.grid[targetIndex].col = coords.col;
            this.grid[targetIndex].row = coords.row;
            this.grid[this.draggedFrom] = null;
            actionPerformed = true;
          } else if (targetItem.id === this.draggedItem.id) {
            // Try merge
            this.tryMerge(this.draggedFrom, targetIndex);
            actionPerformed = true;
          } else {
            // Different items, return to original position
            // (item stays in grid[draggedFrom])
          }
        }

        // Try to spawn new item after any successful action
        if (actionPerformed) {
          this.trySpawnItem();
        }

        // Reset drag state
        this.isDragging = false;
        this.draggedItem = null;
        this.draggedFrom = -1;
      }

      tryMerge(fromIndex, toIndex) {
        const item1 = this.grid[fromIndex];
        const item2 = this.grid[toIndex];

        if (!item1 || !item2 || item1.id !== item2.id) {
          return;
        }

        const itemData = this.game.dataLoader.getItem(item1.id);
        if (!itemData) {
          return;
        }

        // Tier 3 merge: both items consumed, drops are produced
        if (itemData.tier === 3) {
          if (!itemData.drops) return;

          this.grid[fromIndex] = null;
          this.grid[toIndex] = null;

          for (const drop of itemData.drops) {
            this.game.gameState.addItem(drop, 1);
            for (const goal of this.goals) {
              if (goal.item_id === drop) {
                this.collected[drop] = (this.collected[drop] || 0) + 1;
              }
            }
          }

          this.checkVictory();
          return;
        }

        // Normal merge (tier 1 or 2): must have a merge_into target
        if (!itemData.merge_into) {
          return;
        }

        this.grid[fromIndex] = null;
        this.grid[toIndex] = null;

        const coords = this.getCellCoords(toIndex);
        const mergedItemId = itemData.merge_into;
        this.grid[toIndex] = {
          id: mergedItemId,
          col: coords.col,
          row: coords.row
        };

        // Check if merged item itself is a goal (e.g. level 1 goal is leaf_3)
        for (const goal of this.goals) {
          if (goal.item_id === mergedItemId) {
            this.collected[mergedItemId] = (this.collected[mergedItemId] || 0) + 1;
          }
        }

        this.checkVictory();
      }

      checkVictory() {
        let allComplete = true;
        for (const goal of this.goals) {
          const collected = this.collected[goal.item_id] || 0;
          if (collected < goal.count) {
            allComplete = false;
            break;
          }
        }

        if (allComplete) {
          // Mark level as completed
          this.game.gameState.completeLevel(this.chapter, this.level);

          // Add rewards to inventory
          if (this.levelData.rewards) {
            for (const reward of this.levelData.rewards) {
              this.game.gameState.addItem(reward.item_id, reward.count);
            }
          }

          // Save game
          this.game.saveSystem.save();

          // Show victory screen
          this.showVictory = true;
        }
      }

      trySpawnItem() {
        // 70% chance to spawn new item after merge
        if (Math.random() > 0.7) {
          return;
        }

        // Find empty cells (excluding generator cell)
        const emptyCells = [];
        for (let i = 0; i < this.grid.length; i++) {
          if (!this.grid[i] && i !== this.generatorCellIndex) {
            emptyCells.push(i);
          }
        }

        if (emptyCells.length === 0) {
          return;
        }

        // Pick random empty cell
        const randomIndex = emptyCells[Math.floor(Math.random() * emptyCells.length)];

        // Pick random item from spawn pool
        if (this.levelData.spawn_pool && this.levelData.spawn_pool.length > 0) {
          const randomItem = this.levelData.spawn_pool[Math.floor(Math.random() * this.levelData.spawn_pool.length)];
          const coords = this.getCellCoords(randomIndex);
          this.grid[randomIndex] = {
            id: randomItem,
            col: coords.col,
            row: coords.row
          };
        }
      }
    }

    class Workshop extends Scene {
      constructor(game) {
        super(game);
        this.recipes = [];
        this.selectedRecipe = null;
        this.scrollY = 0;
        this.maxScroll = 0;
        this.ITEM_H = 80;
        this.LIST_W = 400;
      }

      onEnter() {
        this.recipes = this.game.dataLoader.recipes;
        this.maxScroll = Math.max(0, this.recipes.length * this.ITEM_H - 480);
        this.selectedRecipe = this.recipes.length > 0 ? this.recipes[0] : null;
        this._onWheel = (e) => {
          this.scrollY = Math.max(0, Math.min(this.maxScroll, this.scrollY + e.deltaY * 0.5));
        };
        this.game.canvas.addEventListener('wheel', this._onWheel);
      }

      onExit() {
        this.game.canvas.removeEventListener('wheel', this._onWheel);
      }

      alreadyOwned(recipe) {
        const resultItem = this.game.dataLoader.getItem(recipe.result);
        if (resultItem && (resultItem.type === 'furniture' || resultItem.type === 'outfit')) {
          return this.game.gameState.hasItem(recipe.result);
        }
        return false;
      }

      canCraft(recipe) {
        if (this.alreadyOwned(recipe)) return false;
        return recipe.ingredients.every(ing =>
          this.game.gameState.hasItem(ing.item_id, ing.count)
        );
      }

      craft(recipe) {
        if (!this.canCraft(recipe)) return;
        for (const ing of recipe.ingredients) {
          this.game.gameState.removeItem(ing.item_id, ing.count);
        }
        this.game.gameState.addItem(recipe.result, 1);
        this.game.saveSystem.save();
      }

      render(ctx) {
        ctx.fillStyle = '#F5E6D3';
        ctx.fillRect(0, 0, 800, 600);

        ctx.fillStyle = '#3E2723';
        ctx.font = 'bold 28px "Microsoft YaHei", Arial';
        ctx.textAlign = 'center';
        ctx.fillText('配方工坊', 400, 40);

        // Left panel: recipe list
        ctx.fillStyle = '#FFF8F0';
        ctx.fillRect(0, 60, this.LIST_W, 480);

        ctx.save();
        ctx.beginPath();
        ctx.rect(0, 60, this.LIST_W, 480);
        ctx.clip();

        for (let i = 0; i < this.recipes.length; i++) {
          const recipe = this.recipes[i];
          const y = 60 + i * this.ITEM_H - this.scrollY;
          if (y + this.ITEM_H < 60 || y > 540) continue;

          ctx.fillStyle = this.selectedRecipe === recipe ? '#FFE0B2' : (i % 2 === 0 ? '#FFFFFF' : '#FFF3E0');
          ctx.fillRect(0, y, this.LIST_W, this.ITEM_H);

          const img = this.game.assetLoader.getImage(recipe.result);
          if (img) {
            ctx.drawImage(img, 8, y + 10, 60, 60);
          } else {
            const it = this.game.dataLoader.getItem(recipe.result);
            ctx.fillStyle = it ? it.color : '#999';
            ctx.beginPath();
            ctx.arc(38, y + 40, 25, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.fillStyle = '#3E2723';
          ctx.font = 'bold 15px "Microsoft YaHei", Arial';
          ctx.textAlign = 'left';
          ctx.fillText(recipe.name, 78, y + 22);

          const ingStr = recipe.ingredients.map(ing => {
            const it = this.game.dataLoader.getItem(ing.item_id);
            const owned = this.game.gameState.inventory[ing.item_id] || 0;
            return `${it ? it.name : ing.item_id}x${ing.count}(${owned})`;
          }).join('  ');
          ctx.fillStyle = this.canCraft(recipe) ? '#4CAF50' : '#999999';
          ctx.font = '12px "Microsoft YaHei", Arial';
          ctx.fillText(ingStr, 78, y + 45);

          if (this.alreadyOwned(recipe)) {
            ctx.fillStyle = '#E53935';
            ctx.font = 'bold 13px "Microsoft YaHei", Arial';
            ctx.textAlign = 'right';
            ctx.fillText('已拥有', this.LIST_W - 8, y + 42);
          } else if (this.canCraft(recipe)) {
            ctx.fillStyle = '#4CAF50';
            ctx.font = 'bold 13px "Microsoft YaHei", Arial';
            ctx.textAlign = 'right';
            ctx.fillText('可合成', this.LIST_W - 8, y + 42);
          }

          ctx.strokeStyle = '#E0D0C0';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(0, y + this.ITEM_H);
          ctx.lineTo(this.LIST_W, y + this.ITEM_H);
          ctx.stroke();
        }
        ctx.restore();

        ctx.strokeStyle = '#C8A87A';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(this.LIST_W, 60);
        ctx.lineTo(this.LIST_W, 600);
        ctx.stroke();

        if (this.selectedRecipe) {
          this.renderDetail(ctx, this.selectedRecipe);
        }

        ctx.fillStyle = '#8B6F47';
        ctx.beginPath();
        ctx.roundRect(20, 548, 110, 42, 8);
        ctx.fill();
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 16px "Microsoft YaHei", Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('返回', 75, 569);
        ctx.textBaseline = 'alphabetic';
      }

      renderDetail(ctx, recipe) {
        ctx.fillStyle = '#3E2723';
        ctx.font = 'bold 20px "Microsoft YaHei", Arial';
        ctx.textAlign = 'center';
        ctx.fillText(recipe.name, 600, 100);

        const resultItem = this.game.dataLoader.getItem(recipe.result);
        const resultImg = this.game.assetLoader.getImage(recipe.result);
        if (resultImg) {
          ctx.drawImage(resultImg, 560, 115, 80, 80);
        } else {
          ctx.fillStyle = resultItem ? resultItem.color : '#999';
          ctx.beginPath();
          ctx.arc(600, 155, 35, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = '#3E2723';
        ctx.font = '15px "Microsoft YaHei", Arial';
        ctx.textAlign = 'center';
        ctx.fillText(resultItem ? resultItem.name : recipe.result, 600, 210);

        ctx.font = 'bold 16px "Microsoft YaHei", Arial';
        ctx.fillText('所需材料：', 600, 248);

        let iy = 275;
        for (const ing of recipe.ingredients) {
          const item = this.game.dataLoader.getItem(ing.item_id);
          const owned = this.game.gameState.inventory[ing.item_id] || 0;
          const enough = owned >= ing.count;
          const img = this.game.assetLoader.getImage(ing.item_id);
          if (img) ctx.drawImage(img, 450, iy - 14, 28, 28);
          ctx.fillStyle = enough ? '#4CAF50' : '#E53935';
          ctx.font = '15px "Microsoft YaHei", Arial';
          ctx.textAlign = 'left';
          ctx.fillText(`${item ? item.name : ing.item_id}  ${owned} / ${ing.count}`, 486, iy + 4);
          iy += 36;
        }

        const alreadyOwned = this.alreadyOwned(recipe);
        const canCraft = this.canCraft(recipe);
        ctx.fillStyle = canCraft ? '#4CAF50' : '#BDBDBD';
        ctx.beginPath();
        ctx.roundRect(505, 425, 190, 52, 10);
        ctx.fill();
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 20px "Microsoft YaHei", Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(alreadyOwned ? '已拥有' : '合成', 600, 451);
        ctx.textBaseline = 'alphabetic';

        const ownedResult = this.game.gameState.inventory[recipe.result] || 0;
        ctx.fillStyle = alreadyOwned ? '#E53935' : '#888';
        ctx.font = '14px "Microsoft YaHei", Arial';
        ctx.textAlign = 'center';
        ctx.fillText(alreadyOwned ? `已拥有 ×${ownedResult}，无需重复合成` : `已拥有: ${ownedResult}`, 600, 498);
      }

      onMouseDown(x, y) {
        if (x >= 20 && x <= 130 && y >= 548 && y <= 590) {
          this.game.sceneManager.switchTo(new MainMenu(this.game));
          return;
        }
        if (x < this.LIST_W && y >= 60 && y <= 540) {
          const idx = Math.floor((y - 60 + this.scrollY) / this.ITEM_H);
          if (idx >= 0 && idx < this.recipes.length) {
            this.selectedRecipe = this.recipes[idx];
          }
          return;
        }
        if (this.selectedRecipe && x >= 505 && x <= 695 && y >= 425 && y <= 477) {
          this.craft(this.selectedRecipe);
        }
      }

      update(deltaTime) {}
      onMouseMove(x, y) {}
      onMouseUp(x, y) {}
    }

          this.invScroll = Math.max(0, Math.min(max, this.invScroll + e.deltaY * 0.5));

          ctx.strokeStyle = '#D7A566';
          ctx.lineWidth = 1.5;
          ctx.stroke();

          if (equipped) {
            const img = this.game.assetLoader.getImage(equipped);
            if (img) ctx.drawImage(img, 437, slot.y + 8, 56, 56);
            ctx.fillStyle = '#3E2723';
            ctx.font = '14px "Microsoft YaHei", Arial';
            ctx.textAlign = 'left';
            ctx.fillText(equippedItem ? equippedItem.name : equipped, 500, slot.y + 47);
            ctx.fillStyle = '#EF9A9A';
            ctx.beginPath();
            ctx.roundRect(718, slot.y + 22, 32, 28, 5);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

        ctx.fillStyle = '#DDAACC';
        ctx.fillRect(0, 500, 800, 2);

        ctx.fillStyle = '#3E2723';
        ctx.font = 'bold 14px "Microsoft YaHei", Arial';
        ctx.textAlign = 'left';
        ctx.fillText('背包服装 (点击装备)：', 10, 522);

        ctx.save();
        ctx.beginPath();
        ctx.rect(0, 528, 800, 72);
        ctx.clip();
        for (let i = 0; i < owned.length; i++) {
          const item = owned[i];
          const ix = 10 + i * this.ITEM_W - this.invScroll;
          if (ix + this.ITEM_W < 0 || ix > 800) continue;
          const img = this.game.assetLoader.getImage(item.id);
          if (img) {
            ctx.drawImage(img, ix, 530, 68, 60);
          } else {
            ctx.fillStyle = item.color || '#999';
            ctx.beginPath();
            ctx.roundRect(ix, 533, 68, 52, 6);
            ctx.fill();

          ctx.font = '10px "Microsoft YaHei", Arial';
          ctx.textAlign = 'center';
          ctx.fillText(item.name, ix + 34, 596);

        ctx.restore();

        if (owned.length === 0) {
          ctx.fillStyle = '#BDBDBD';
          ctx.font = '15px "Microsoft YaHei", Arial';
          ctx.textAlign = 'center';
          ctx.fillText('背包中没有服装，请先在配方工坊合成', 400, 562);

        ctx.fillStyle = '#8B6F47';
        ctx.beginPath();
        ctx.roundRect(655, 548, 125, 42, 8);
        ctx.fill();
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 16px "Microsoft YaHei", Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('返回', 717, 569);
        ctx.textBaseline = 'alphabetic';

      onMouseDown(x, y) {
        if (x >= 655 && x <= 780 && y >= 548 && y <= 590) {
          this.game.sceneManager.switchTo(new MainMenu(this.game));
          return;
        }
        const outfit = this.game.gameState.outfit;
        for (const slot of this.SLOTS) {
          if (outfit[slot.id] && x >= 718 && x <= 750 && y >= slot.y + 22 && y <= slot.y + 50) {
            this.game.gameState.unequip(slot.id);
            this.game.saveSystem.save();
            return;
          }
        }
        if (y >= 528 && y <= 600) {
          const owned = this.getOwnedOutfits();
          for (let i = 0; i < owned.length; i++) {
            const ix = 10 + i * this.ITEM_W - this.invScroll;
            if (x >= ix && x <= ix + this.ITEM_W) {
              const item = owned[i];
              this.game.gameState.equip(item.slot, item.id);
              this.game.saveSystem.save();
              for (const chapter of this.game.dataLoader.chapters) {
                for (const goal of chapter.goals || []) {
                  if (goal.type === 'equip' && goal.item_id === item.id) {
                    this.game.gameState.completeGoal(goal.id);
                    this.game.saveSystem.save();
                  }
                }
              }
              return;
            }
          }
        }
      }

      update(deltaTime) {}
      onMouseMove(x, y) {}
      onMouseUp(x, y) {}
    }

    // ============================================================
    // ROOM SCENE
    // ============================================================
    class Room extends Scene {
      constructor(game) {
        super(game);
        this.ROOM_H = 390;
        this.INV_Y = 398;
        this.ITEM_W = 90;
        this.invScroll = 0;
        this.draggingItem = null;
        this.draggingFromRoom = false; // Track if dragging from room or inventory
        this.dragOffsetX = 0;
        this.dragOffsetY = 0;
        this.hoverFurniture = null;
      }

      onEnter() {
        this._onWheel = (e) => {
          const max = Math.max(0, this.getUnplaced().length * this.ITEM_W - 720);
          this.invScroll = Math.max(0, Math.min(max, this.invScroll + e.deltaY * 0.5));
        };
        this.game.canvas.addEventListener('wheel', this._onWheel);
      }

      onExit() {
        this.game.canvas.removeEventListener('wheel', this._onWheel);
      }

      getAllOwned() {
        return this.game.dataLoader.items.filter(item =>
          item.type === 'furniture' && this.game.gameState.hasItem(item.id)
        );
      }

      getUnplaced() {
        const placed = this.game.gameState.placedFurniture;
        return this.getAllOwned().filter(item => !placed[item.id]);
      }

      getPlaced() {
        const placed = this.game.gameState.placedFurniture;
        return Object.entries(placed).map(([id, pos]) => ({
          id, x: pos.x, y: pos.y,
          item: this.game.dataLoader.getItem(id)
        })).filter(f => f.item);
      }

      // Draw 3D perspective room background
      drawRoomBackground(ctx) {
        // Floor with wood texture
        const floorGradient = ctx.createLinearGradient(0, this.ROOM_H - 150, 0, this.ROOM_H);
        floorGradient.addColorStop(0, '#C9A87A');
        floorGradient.addColorStop(0.5, '#B89968');
        floorGradient.addColorStop(1, '#A68958');
        ctx.fillStyle = floorGradient;
        ctx.fillRect(0, this.ROOM_H - 150, 800, 150);

        // Floor planks
        ctx.strokeStyle = 'rgba(139, 111, 71, 0.3)';
        ctx.lineWidth = 2;
        for (let i = 0; i < 8; i++) {
          const y = this.ROOM_H - 150 + i * 20;
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(800, y);
          ctx.stroke();
        }

        // Wall with wallpaper texture
        const wallGradient = ctx.createLinearGradient(0, 0, 0, this.ROOM_H - 150);
        wallGradient.addColorStop(0, '#F5E6D3');
        wallGradient.addColorStop(0.5, '#E8D5B7');
        wallGradient.addColorStop(1, '#D4C4A8');
        ctx.fillStyle = wallGradient;
        ctx.fillRect(0, 0, 800, this.ROOM_H - 150);

        // Wallpaper pattern (subtle damask)
        ctx.strokeStyle = 'rgba(200, 168, 122, 0.15)';
        ctx.lineWidth = 1;
        for (let x = 50; x < 800; x += 100) {
          for (let y = 50; y < this.ROOM_H - 150; y += 100) {
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(x, y, 12, 0, Math.PI * 2);
            ctx.stroke();
          }
        }

        // Baseboard
        ctx.fillStyle = '#8B6F47';
        ctx.fillRect(0, this.ROOM_H - 160, 800, 10);
        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
        ctx.fillRect(0, this.ROOM_H - 150, 800, 3);

        // Window (left side)
        const windowX = 80, windowY = 80, windowW = 140, windowH = 180;
        ctx.fillStyle = '#A8D8EA';
        ctx.fillRect(windowX, windowY, windowW, windowH);
        ctx.strokeStyle = '#6B5B3D';
        ctx.lineWidth = 8;
        ctx.strokeRect(windowX, windowY, windowW, windowH);
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(windowX + windowW / 2, windowY);
        ctx.lineTo(windowX + windowW / 2, windowY + windowH);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(windowX, windowY + windowH / 2);
        ctx.lineTo(windowX + windowW, windowY + windowH / 2);
        ctx.stroke();

        // Window light effect
        ctx.fillStyle = 'rgba(255, 255, 200, 0.2)';
        ctx.fillRect(windowX, windowY, windowW, windowH);

        // Door (right side)
        const doorX = 600, doorY = 100, doorW = 100, doorH = 200;
        ctx.fillStyle = '#8B6F47';
        ctx.fillRect(doorX, doorY, doorW, doorH);
        ctx.strokeStyle = '#6B5B3D';
        ctx.lineWidth = 4;
        ctx.strokeRect(doorX, doorY, doorW, doorH);

        // Door panels
        ctx.strokeStyle = '#6B5B3D';
        ctx.lineWidth = 2;
        ctx.strokeRect(doorX + 10, doorY + 10, doorW - 20, doorH / 2 - 15);
        ctx.strokeRect(doorX + 10, doorY + doorH / 2 + 5, doorW - 20, doorH / 2 - 15);

        // Door knob
        ctx.fillStyle = '#D4AF37';
        ctx.beginPath();
        ctx.arc(doorX + doorW - 20, doorY + doorH / 2, 5, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw shadow for furniture
      drawShadow(ctx, x, y, size) {
        ctx.save();
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.beginPath();
        ctx.ellipse(x, y + size / 2 + 5, size * 0.4, size * 0.15, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      render(ctx) {
        // Draw 3D room background
        this.drawRoomBackground(ctx);

        // Title
        ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
        ctx.fillRect(250, 10, 300, 40);
        ctx.strokeStyle = '#8B6F47';
        ctx.lineWidth = 2;
        ctx.strokeRect(250, 10, 300, 40);
        ctx.fillStyle = '#3E2723';
        ctx.font = 'bold 22px "Microsoft YaHei", Arial';
        ctx.textAlign = 'center';
        ctx.fillText('房间装修', 400, 38);

        // Sort furniture by Y position for depth
        const placedFurniture = this.getPlaced().sort((a, b) => a.y - b.y);

        // Draw placed furniture with shadows (skip the one being dragged)
        for (const pf of placedFurniture) {
          // Skip rendering if this furniture is being dragged
          if (this.draggingItem && this.draggingFromRoom && pf.id === this.draggingItem.id) {
            continue;
          }

          const img = this.game.assetLoader.getImage(pf.id);
          const S = 80;
          const isHovered = this.hoverFurniture === pf.id;

          // Draw shadow
          this.drawShadow(ctx, pf.x, pf.y, S);

          // Highlight if hovered
          if (isHovered) {
            ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
            ctx.beginPath();
            ctx.roundRect(pf.x - S / 2 - 5, pf.y - S / 2 - 5, S + 10, S + 10, 8);
            ctx.fill();
          }

          // Draw furniture
          if (img) {
            ctx.drawImage(img, pf.x - S / 2, pf.y - S / 2, S, S);
          } else {
            ctx.fillStyle = pf.item.color || '#888';
            ctx.beginPath();
            ctx.roundRect(pf.x - S / 2, pf.y - S / 2, S, S, 6);
            ctx.fill();
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.lineWidth = 2;
            ctx.stroke();
          }

          // Name label with background
          ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
          const nameWidth = ctx.measureText(pf.item.name).width + 12;
          ctx.beginPath();
          ctx.roundRect(pf.x - nameWidth / 2, pf.y + S / 2 + 6, nameWidth, 18, 4);
          ctx.fill();
          ctx.fillStyle = '#3E2723';
          ctx.font = '11px "Microsoft YaHei", Arial';
          ctx.textAlign = 'center';
          ctx.fillText(pf.item.name, pf.x, pf.y + S / 2 + 18);
        }

        // Draw dragging item preview
        if (this.draggingItem) {
          const S = 80;
          ctx.save();
          ctx.globalAlpha = 0.7;
          const img = this.game.assetLoader.getImage(this.draggingItem.id);
          if (img) {
            ctx.drawImage(img, this.draggingItem.x - S / 2, this.draggingItem.y - S / 2, S, S);
          } else {
            ctx.fillStyle = this.draggingItem.color || '#888';
            ctx.beginPath();
            ctx.roundRect(this.draggingItem.x - S / 2, this.draggingItem.y - S / 2, S, S, 6);
            ctx.fill();
          }
          ctx.restore();
        }

        if (placedFurniture.length === 0 && !this.draggingItem) {
          ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
          ctx.fillRect(200, 180, 400, 50);
          ctx.fillStyle = 'rgba(100,80,60,0.8)';
          ctx.font = '18px "Microsoft YaHei", Arial';
          ctx.textAlign = 'center';
          ctx.fillText('拖拽下方家具到房间中放置', 400, 210);
        }

        // Separator
        ctx.fillStyle = '#8B6F47';
        ctx.fillRect(0, this.ROOM_H, 800, 4);
        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
        ctx.fillRect(0, this.ROOM_H + 4, 800, 2);

        // Inventory panel
        ctx.fillStyle = '#FFF8EE';
        ctx.fillRect(0, this.INV_Y, 800, 202);

        ctx.fillStyle = '#3E2723';
        ctx.font = 'bold 14px "Microsoft YaHei", Arial';
        ctx.textAlign = 'left';
        ctx.fillText('家具背包 (拖拽放置)：', 10, this.INV_Y + 22);

        const unplaced = this.getUnplaced();
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, this.INV_Y + 28, 800, 120);
        ctx.clip();
        for (let i = 0; i < unplaced.length; i++) {
          const item = unplaced[i];
          const ix = 10 + i * this.ITEM_W - this.invScroll;
          if (ix + this.ITEM_W < 0 || ix > 800) continue;

          // Item background
          ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
          ctx.beginPath();
          ctx.roundRect(ix, this.INV_Y + 32, 75, 90, 8);
          ctx.fill();
          ctx.strokeStyle = '#D4C4A8';
          ctx.lineWidth = 2;
          ctx.stroke();

          const img = this.game.assetLoader.getImage(item.id);
          if (img) {
            ctx.drawImage(img, ix + 2, this.INV_Y + 34, 70, 70);
          } else {
            ctx.fillStyle = item.color || '#888';
            ctx.beginPath();
            ctx.roundRect(ix + 5, this.INV_Y + 38, 65, 60, 6);
            ctx.fill();
          }
          ctx.fillStyle = '#3E2723';
          ctx.font = '10px "Microsoft YaHei", Arial';
          ctx.textAlign = 'center';
          ctx.fillText(item.name, ix + 37, this.INV_Y + 116);
        }
        ctx.restore();

        if (unplaced.length === 0) {
          ctx.fillStyle = '#BDBDBD';
          ctx.font = '15px "Microsoft YaHei", Arial';
          ctx.textAlign = 'center';
          ctx.fillText(
            this.getAllOwned().length > 0 ? '所有家具已放置' : '背包中没有家具，请先合成',
            400, this.INV_Y + 80
          );
        }

        // Return button
        ctx.fillStyle = '#8B6F47';
        ctx.beginPath();
        ctx.roundRect(655, 548, 125, 42, 8);
        ctx.fill();
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 16px "Microsoft YaHei", Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('返回', 717, 569);
        ctx.textBaseline = 'alphabetic';
      }

      onMouseDown(x, y) {
        if (x >= 655 && x <= 780 && y >= 548 && y <= 590) {
          this.game.sceneManager.switchTo(new MainMenu(this.game));
          return;
        }

        const S = 80;

        // Check if clicking on placed furniture in room
        if (y < this.ROOM_H) {
          for (const pf of this.getPlaced()) {
            if (x >= pf.x - S / 2 && x <= pf.x + S / 2 &&
                y >= pf.y - S / 2 && y <= pf.y + S / 2) {
              // Start dragging from room
              const item = this.game.dataLoader.getItem(pf.id);
              this.draggingItem = {
                id: pf.id,
                name: item.name,
                color: item.color,
                x: pf.x,
                y: pf.y
              };
              this.draggingFromRoom = true;
              this.dragOffsetX = x - pf.x;
              this.dragOffsetY = y - pf.y;
              return;
            }
          }
        }

        // Start dragging from inventory
        if (y >= this.INV_Y + 28 && y <= this.INV_Y + 148) {
          const unplaced = this.getUnplaced();
          for (let i = 0; i < unplaced.length; i++) {
            const ix = 10 + i * this.ITEM_W - this.invScroll;
            if (x >= ix && x <= ix + 75) {
              const item = unplaced[i];
              this.draggingItem = {
                id: item.id,
                name: item.name,
                color: item.color,
                x: x,
                y: y
              };
              this.draggingFromRoom = false;
              this.dragOffsetX = 0;
              this.dragOffsetY = 0;
              return;
            }
          }
        }
      }

      onMouseMove(x, y) {
        // Update dragging position
        if (this.draggingItem) {
          this.draggingItem.x = x - this.dragOffsetX;
          this.draggingItem.y = y - this.dragOffsetY;
        }

        // Update hover state (only when not dragging)
        if (!this.draggingItem) {
          this.hoverFurniture = null;
          if (y < this.ROOM_H) {
            const S = 80;
            for (const pf of this.getPlaced()) {
              if (x >= pf.x - S / 2 && x <= pf.x + S / 2 &&
                  y >= pf.y - S / 2 && y <= pf.y + S / 2) {
                this.hoverFurniture = pf.id;
                break;
              }
            }
          }
        }
      }

      onMouseUp(x, y) {
        if (this.draggingItem) {
          // If dropped in inventory area, remove from room
          if (y >= this.INV_Y) {
            if (this.draggingFromRoom) {
              // Remove furniture from room (return to inventory)
              delete this.game.gameState.placedFurniture[this.draggingItem.id];
              this.game.saveSystem.save();
            }
            // If dragging from inventory and dropped back in inventory, do nothing
          } else if (y < this.ROOM_H && y > 60) {
            // Dropped in room area
            const clampedX = Math.max(50, Math.min(750, this.draggingItem.x));
            const clampedY = Math.max(80, Math.min(this.ROOM_H - 50, this.draggingItem.y));

            // Update or add furniture position
            this.game.gameState.placedFurniture[this.draggingItem.id] = {
              x: clampedX,
              y: clampedY
            };
            this.game.saveSystem.save();

            // Check for goal completion (only for new placements)
            if (!this.draggingFromRoom) {
              for (const chapter of this.game.dataLoader.chapters) {
                for (const goal of chapter.goals || []) {
                  if (goal.type === 'place_furniture' && goal.item_id === this.draggingItem.id) {
                    this.game.gameState.completeGoal(goal.id);
                    this.game.saveSystem.save();
                  }
                }
              }
            }
          } else {
            // Dropped outside valid areas
            if (this.draggingFromRoom) {
              // Keep it in the room at original position (do nothing, it's still in placedFurniture)
            }
            // If from inventory and dropped in invalid area, do nothing (stays in inventory)
          }

          this.draggingItem = null;
          this.draggingFromRoom = false;
        }
      }

      update(deltaTime) {}
    }

    // ============================================================
    // STORY SCENE
    // ============================================================
    class Story extends Scene {
      constructor(game, storyData, onComplete) {
        super(game);
        this.lines = storyData ? storyData.lines : [];
        this.onComplete = onComplete;
        this.lineIndex = 0;
        this.charIndex = 0;
        this.elapsed = 0;
        this.CHAR_DELAY = 0.04;
        this.currentText = '';
        this.done = false;
      }

      onEnter() {
        this.lineIndex = 0;
        this.charIndex = 0;
        this.currentText = '';
        this.elapsed = 0;
        this.done = this.lines.length === 0;
        if (this.done && this.onComplete) this.onComplete();
      }

      update(deltaTime) {
        if (this.done || !this.lines[this.lineIndex]) return;
        const line = this.lines[this.lineIndex];
        if (this.charIndex < line.text.length) {
          this.elapsed += deltaTime;
          while (this.elapsed >= this.CHAR_DELAY && this.charIndex < line.text.length) {
            this.elapsed -= this.CHAR_DELAY;
            this.charIndex++;
          }
          this.currentText = line.text.substring(0, this.charIndex);
        }
      }

      render(ctx) {
        ctx.fillStyle = '#1A0A00';
        ctx.fillRect(0, 0, 800, 600);

        const charImg = this.game.assetLoader.getImage('character');
        if (charImg) {
          const maxH = 340;
          const ratio = maxH / charImg.height;
          const dw = charImg.width * ratio;
          ctx.drawImage(charImg, (800 - dw) / 2, 15, dw, maxH);
        }

        ctx.fillStyle = 'rgba(15, 8, 0, 0.88)';
        ctx.beginPath();
        ctx.roundRect(20, 365, 760, 195, 12);
        ctx.fill();
        ctx.strokeStyle = '#C8A87A';
        ctx.lineWidth = 2;
        ctx.stroke();

        if (this.lines.length > 0 && this.lineIndex < this.lines.length) {
          const line = this.lines[this.lineIndex];
          ctx.fillStyle = '#FFD700';
          ctx.font = 'bold 20px "Microsoft YaHei", Arial';
          ctx.textAlign = 'left';
          ctx.fillText(line.speaker, 40, 398);

          ctx.fillStyle = '#FFFFFF';
          ctx.font = '17px "Microsoft YaHei", Arial';
          this.wrapText(ctx, this.currentText, 40, 428, 720, 27);

          if (this.charIndex >= line.text.length) {
            ctx.fillStyle = '#C8A87A';
            ctx.font = '13px Arial';
            ctx.textAlign = 'right';
            const label = this.lineIndex < this.lines.length - 1 ? '点击继续 >' : '点击结束 >';
            ctx.fillText(label, 770, 548);
          }
        }
      }

      wrapText(ctx, text, x, y, maxWidth, lineH) {
        let line = '', curY = y;
        for (const ch of text) {
          const test = line + ch;
          if (ctx.measureText(test).width > maxWidth && line !== '') {
            ctx.fillText(line, x, curY);
            line = ch;
            curY += lineH;
            if (curY > 548) break;
          } else {
            line = test;
          }
        }
        if (line) ctx.fillText(line, x, curY);
      }

      onMouseDown(x, y) {
        if (this.done) { if (this.onComplete) this.onComplete(); return; }
        const line = this.lines[this.lineIndex];
        if (!line) return;
        if (this.charIndex < line.text.length) {
          this.charIndex = line.text.length;
          this.currentText = line.text;
        } else {
          this.lineIndex++;
          if (this.lineIndex >= this.lines.length) {
            this.done = true;
            if (this.onComplete) this.onComplete();
          } else {
            this.charIndex = 0;
            this.currentText = '';
            this.elapsed = 0;
          }
        }
      }

      onMouseMove(x, y) {}
      onMouseUp(x, y) {}
    }

    // Start game when page loads
    window.addEventListener('load', () => {
      const game = new Game();
      window.game = game; // Expose for debugging
      game.start();
    });
  </script>
</body>
