<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>合成养成游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #gameContainer {
      position: relative;
      width: 800px;
      height: 600px;
      background: white;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      border-radius: 8px;
      overflow: hidden;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #loadingScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
    }

    #loadingScreen h1 {
      font-size: 32px;
      margin-bottom: 40px;
    }

    #loadingBar {
      width: 300px;
      height: 20px;
      background: rgba(255,255,255,0.3);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    #loadingProgress {
      width: 0%;
      height: 100%;
      background: white;
      transition: width 0.3s ease;
    }

    #loadingText {
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="loadingScreen">
      <h1>合成养成游戏</h1>
      <div id="loadingBar">
        <div id="loadingProgress"></div>
      </div>
      <div id="loadingText">加载中... 0%</div>
    </div>
  </div>

  <script>
    // Game code will go here
  </script>
</body>
</html>
